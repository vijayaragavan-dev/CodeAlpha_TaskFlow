{% extends "base.html" %}
{% block title %}Page Not Found - TaskFlow{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="error-card">
            <div class="mb-4">
                <i class="bi bi-compass display-1 text-warning"></i>
            </div>
            <h1 class="display-1 text-warning fw-bold">404</h1>
            <h2 class="mb-3">Page Not Found</h2>
            <p class="lead text-muted mb-2">The page you are looking for does not exist or has been moved.</p>
            <p class="text-muted mb-4">Check the URL or navigate to a known page.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('auth.dashboard') if current_user.is_authenticated else url_for('index') }}" class="btn btn-primary btn-lg">
                    <i class="bi bi-speedometer2"></i> Go to Dashboard
                </a>
                <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg">
                    <i class="bi bi-arrow-left"></i> Go Back
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
